name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, unsigned)
        run: |
          xcodebuild \
            -project PrettyDoc.xcodeproj \
            -scheme PrettyDoc \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="build/Build/Products/Release/Pretty Doc.app"
          ZIP="PrettyDoc-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP" "$ZIP"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
          body: |
            Pretty Doc ${{ steps.package.outputs.version }}

            This build is **unsigned** (no Apple Developer ID). On first launch,
            right-click the app and choose **Open**, or run:

            ```
            xattr -dr com.apple.quarantine "/Applications/Pretty Doc.app"
            ```

            SHA-256 (`${{ steps.package.outputs.zip }}`):
            `${{ steps.package.outputs.sha }}`
