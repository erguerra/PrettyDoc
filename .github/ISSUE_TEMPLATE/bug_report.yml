name: Bug report
description: Report a problem with Pretty Doc
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pretty Doc version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.5 (Sonoma)"
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Sample Markdown (if relevant)
      description: A minimal snippet that triggers the issue.
      render: markdown
